[project]
name = "bizu-saas-vercel"
description = "Boilerplate full-stack Bizu SaaS — deploy exclusivo na Vercel"

[project.deployment]
target = "vercel"
demo_url = "https://bizu.bru.ia.br"
repository = "https://github.com/brunopelatieri/bizu-saas-vercel"

[project.branch_naming]
description = "Single-branch workflow - develop all features on current branch or manually created branch"
patterns = [
    "current",
]
validation_rules = []
default_pattern = "feature/{feature-name}"

[project.template_settings]
ai_assistants = [
    "claude",
]
config_directory = ".specify"
template_cache_enabled = true
